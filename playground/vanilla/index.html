<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ngockhoi96/ctc -- Vanilla Playground</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
      .section { margin-bottom: 1.5rem; }
      .section h2 { font-size: 1rem; margin-bottom: 0.5rem; }
      input { border: 1px solid #ccc; padding: 0.4rem 0.6rem; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 0.5rem; }
      button { padding: 0.4rem 1rem; border-radius: 4px; border: 1px solid #888; cursor: pointer; background: #f4f4f4; }
      button:hover { background: #e0e0e0; }
      #feedback { margin-top: 0.4rem; font-size: 0.875rem; min-height: 1.25em; }
      #feedback.copied { color: green; }
      #feedback.error { color: red; }
      .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
      .badge.secure { background: #d4edda; color: #155724; }
      .badge.insecure { background: #f8d7da; color: #721c24; }
      table { border-collapse: collapse; width: 100%; font-size: 0.875rem; }
      th, td { text-align: left; padding: 0.3rem 0.5rem; border-bottom: 1px solid #eee; }
      th { background: #f9f9f9; }
    </style>
  </head>
  <body>
    <h1>@ngockhoi96/ctc -- Vanilla Playground</h1>
    <div class="section">
      <h2>Copy to Clipboard</h2>
      <input id="copy-input" type="text" value="Hello from @ngockhoi96/ctc" />
      <button id="copy-btn">Copy</button>
      <div id="feedback"></div>
    </div>
    <div class="section">
      <h2>Secure Context</h2>
      <span id="secure-badge" class="badge"></span>
    </div>
    <div class="section">
      <h2>Detection Panel</h2>
      <table>
        <thead>
          <tr>
            <th>Function</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="detection-tbody"></tbody>
      </table>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
