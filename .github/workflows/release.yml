# .github/workflows/release.yml
# Triggers on push to master.
# Uses changesets/action@v1 to:
#   1. Open a "Version PR" (bumps version + generates CHANGELOG.md) when .changeset files are present
#   2. Publish to npm when the Version PR is merged (no .changeset files remain)
#
# Uses npm OIDC Trusted Publishing — no NPM_TOKEN secret required.
# Modeled after sveltejs/svelte and sveltejs/kit release workflows.
#
# First publish only: OIDC requires the package to already exist on npm.
# For the very first publish, temporarily add NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
# to the changesets step env, publish once, then remove it and configure Trusted Publishers:
#   1. Go to npmjs.com/package/@ngockhoi96/ctc/access → Trusted Publishers → Add
#   2. Provider: GitHub Actions
#      Owner: anIcedAntFA  |  Repository: ctc  |  Workflow: release.yml
#   3. Delete NPM_TOKEN from GitHub repo secrets once first OIDC publish succeeds
name: Release

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level permissions empty — scoped per job
permissions: {}

jobs:
  release:
    name: Create Version PR or Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push version commits and create git tags
      pull-requests: write   # open Version PR
      id-token: write        # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets needs full history to detect changes

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Node 24 ships npm 11.x which supports OIDC natively.
      # Node 22 ships npm 10.x which breaks OIDC for scoped packages (npm/cli#8976).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Version PR or Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          # NODE_AUTH_TOKEN intentionally absent — its presence disables OIDC
          # and falls back to token auth (actions/setup-node#1440).
          # For FIRST PUBLISH ONLY, temporarily uncomment the line below:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
